<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Recognition Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="diamond-grid"></div>
    <div class="ambient-glows">
        <div class="glow gold-glow"></div>
        <div class="glow blue-glow"></div>
    </div>

    <main class="container">
        <div class="banner-wrapper gold-theme">
            <div class="hex-border">
                <div class="hex-glass-inner">
                    <div class="icon-gem"></div>
                    <h1 class="heading text-gold">Card Scanner</h1>
                    <div style="width: 28px;"></div> <!-- Spacer for balance -->
                </div>
            </div>
        </div>

        <section class="upload-section glass-panel" id="upload-section">
            <div class="upload-area" id="upload-area">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p class="upload-text">Drag & drop your screenshot here</p>
                <p class="upload-subtext">or click to browse files</p>
                <input type="file" id="file-input" accept="image/*" hidden>
            </div>
            
            <div class="preview-area" id="preview-area" style="display: none;">
                <img id="image-preview" src="" alt="Preview">
                <button class="btn primary-btn" id="analyze-btn">Analyze Cards</button>
                <button class="btn secondary-btn" id="cancel-btn">Cancel</button>
            </div>
            
            <div class="loading-area" id="loading-area" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing image with ViT-B-32...</p>
            </div>
        </section>

        <section class="results-section" id="results-section" style="display: none;">
            <div class="banner-wrapper blue-theme">
                <div class="hex-border">
                    <div class="hex-glass-inner" style="padding: 0 20px;">
                        <h2 class="super-title" style="margin: 0; padding-top: 10px;">Detected Cards</h2>
                    </div>
                </div>
            </div>
            <div class="results-grid" id="results-grid">
                <!-- Results will be injected here via JS -->
            </div>
            
            <div class="actions-group" style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                <button class="btn primary-btn" id="generate-story-btn">Generate Story</button>
                <button class="btn secondary-btn reset-btn" id="scan-again-btn">Scan Another</button>
            </div>
        </section>

        <section class="story-view-section" id="story-view-section" style="display: none;">
            <div class="cinematic-header">
                <h2>Clash Chronicles</h2>
                <p style="font-family: 'Outfit', sans-serif; color: #94a3b8; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 0.5rem;">An Official Arena Story</p>
            </div>
            
            <div class="detected-team-mini" id="detected-team-mini">
                <!-- Injected via JS -->
            </div>

            <div class="loading-area" id="loading-story" style="display: none; margin-top: 4rem;">
                <div class="spinner"></div>
                <p>Chronicling the battle...</p>
            </div>

            <div class="act-container glass-panel" id="act-container" style="display: none; margin-top: 2rem; padding: 3rem;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <p id="act-eyebrow" style="font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; color: #64748b; margin-bottom: 0.5rem;">Act I</p>
                    <h3 id="act-title" class="act-title" style="font-size: 2rem; color: #facc15; margin: 0;">The Team</h3>
                </div>
                <div class="story-content cinematic-text" id="story-content" style="white-space: pre-wrap; line-height: 1.8; font-size: 1.1rem; text-align: left; margin-bottom: 3rem;"></div>
                
                <div class="act-nav" style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
                    <button class="btn secondary-btn" id="prev-act-btn" disabled>← Previous Act</button>
                    <span id="act-indicator" style="font-weight: 600; color: #a1a1aa; font-family: 'Outfit', sans-serif; letter-spacing: 2px;">Act 1 / 3</span>
                    <button class="btn primary-btn" id="next-act-btn">Next Act →</button>
                </div>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <button class="btn secondary-btn reset-btn" id="story-scan-again-btn">Scan Another Deck</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const previewArea = document.getElementById('preview-area');
        const imagePreview = document.getElementById('image-preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const loadingArea = document.getElementById('loading-area');
        const uploadSection = document.getElementById('upload-section');
        const resultsSection = document.getElementById('results-section');
        const resultsGrid = document.getElementById('results-grid');
        const scanAgainBtn = document.getElementById('scan-again-btn');
        const generateStoryBtn = document.getElementById('generate-story-btn');
        const storyViewSection = document.getElementById('story-view-section');
        const detectedTeamMini = document.getElementById('detected-team-mini');
        const loadingStory = document.getElementById('loading-story');
        const actContainer = document.getElementById('act-container');
        const actTitle = document.getElementById('act-title');
        const storyContent = document.getElementById('story-content');
        const prevActBtn = document.getElementById('prev-act-btn');
        const nextActBtn = document.getElementById('next-act-btn');
        const actIndicator = document.getElementById('act-indicator');
        const storyScanAgainBtn = document.getElementById('story-scan-again-btn');
        
        let selectedFile = null;
        let currentDeck = [];
        let acts = [];
        let currentActIndex = 0;
        // Drag and Drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                handleFile(fileInput.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file.');
                return;
            }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                uploadArea.style.display = 'none';
                previewArea.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function resetAll() {
            selectedFile = null;
            fileInput.value = '';
            previewArea.style.display = 'none';
            uploadSection.style.display = 'block';
            resultsSection.style.display = 'none';
            storyViewSection.style.display = 'none';
            actContainer.style.display = 'none';
            uploadArea.style.display = 'flex';
            currentDeck = [];
            acts = [];
            currentActIndex = 0;
            generateStoryBtn.disabled = false;
        }

        cancelBtn.addEventListener('click', resetAll);
        scanAgainBtn.addEventListener('click', resetAll);
        storyScanAgainBtn.addEventListener('click', resetAll);

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            previewArea.style.display = 'none';
            loadingArea.style.display = 'flex';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayResults(data.results);
                } else {
                    alert('Error: ' + data.error);
                    cancelBtn.click();
                }
            } catch (err) {
                alert('Upload failed: ' + err.message);
                cancelBtn.click();
            } finally {
                loadingArea.style.display = 'none';
            }
        });

        function formatLabel(label) {
            let formatted = label;
            if (formatted.endsWith('-ev1')) formatted = formatted.replace('-ev1', '-evolved');
            if (formatted.endsWith('-evo')) formatted = formatted.replace('-evo', '-evolved');
            return formatted;
        }

        function displayResults(results) {
            uploadSection.style.display = 'none';
            resultsSection.style.display = 'block';
            resultsGrid.innerHTML = '';
            
            // Initialize the current deck with the top matches
            currentDeck = results.map(r => formatLabel(r.label));

            results.forEach((res, index) => {
                const card = document.createElement('div');
                card.className = 'result-card glass-panel';
                // Add an ID to the card so we can target it later
                card.id = `result-card-${index}`;
                
                const topMatch = res.matches[0];
                const simScore = (topMatch.score * 100).toFixed(1);
                const formattedTopLabel = formatLabel(topMatch.label);
                
                // Build the dropdown options HTML
                let dropdownHtml = '<div class="card-dropdown-container">';
                res.matches.forEach(match => {
                    const matchScore = (match.score * 100).toFixed(1);
                    const formattedMatchLabel = formatLabel(match.label);
                    dropdownHtml += `
                        <div class="dropdown-item" onclick="selectAlternative(event, ${index}, '${formattedMatchLabel}', ${matchScore})">
                            <span class="dropdown-label">${formattedMatchLabel}</span>
                            <span class="dropdown-score">${matchScore}%</span>
                        </div>
                    `;
                });
                dropdownHtml += '</div>';

                card.innerHTML = `
                    <div class="region-badge">Pos ${res.region}</div>
                    <div class="card-content">
                        <h3 class="card-title" id="card-title-${index}">${formattedTopLabel}</h3>
                        <div class="similarity-bar">
                            <div class="similarity-fill" id="similarity-fill-${index}" style="width: ${Math.min(simScore, 100)}%"></div>
                        </div>
                        <p class="similarity-text" id="similarity-text-${index}">${simScore}% match</p>
                    </div>
                    ${dropdownHtml}
                `;

                // Toggle dropdown on click
                card.addEventListener('click', (e) => {
                    // Close all other dropdowns
                    document.querySelectorAll('.result-card.active').forEach(c => {
                        if (c !== card) c.classList.remove('active');
                    });
                    card.classList.toggle('active');
                });

                resultsGrid.appendChild(card);
            });

            // Close dropdowns when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.result-card')) {
                    document.querySelectorAll('.result-card.active').forEach(c => {
                        c.classList.remove('active');
                    });
                }
            });
        }

        function selectAlternative(event, index, newLabel, newScore) {
            event.stopPropagation(); // Prevent toggling the dropdown again
            
            // Update the UI
            document.getElementById(`card-title-${index}`).textContent = newLabel;
            document.getElementById(`similarity-fill-${index}`).style.width = `${Math.min(newScore, 100)}%`;
            document.getElementById(`similarity-text-${index}`).textContent = `${newScore}% match`;
            
            // Update the underlying deck array
            currentDeck[index] = newLabel;
            
            // Close the dropdown
            document.getElementById(`result-card-${index}`).classList.remove('active');
        }

        function parseActs(storyText) {
            const lines = storyText.split('\n');
            const parsedActs = [];
            let currentActContent = [];
            let currentActNum = 'Act I';
            let currentActTitle = 'The Chronicle';
            let inAct = false;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // Match lines like "# Act I - The Team" or "**Act 2:**"
                const actMatch = line.match(/^(?:#|\*)*\s*Act\s+(I{1,3}|IV|V|1|2|3|4|5)(.*)$/i);
                
                if (actMatch) {
                    // Save the previous act if we were building one
                    if (inAct) {
                        parsedActs.push({
                            actNum: currentActNum,
                            title: currentActTitle,
                            content: currentActContent.join('\n').trim()
                        });
                        currentActContent = [];
                    }
                    
                    inAct = true;
                    currentActNum = `Act ${actMatch[1].toUpperCase()}`;
                    
                    let rawTitle = actMatch[2].trim();
                    // Clean up leading dashes, colons, stars
                    rawTitle = rawTitle.replace(/^[-—:*\s]+/, '').replace(/[*]+$/, '').trim();
                    currentActTitle = rawTitle || currentActNum;
                } else {
                    if (inAct) {
                        currentActContent.push(line);
                    } else if (line.length > 0) {
                        // Intro text before the first Act header
                        inAct = true;
                        currentActContent.push(line);
                    }
                }
            }
            
            // Push the final act
            if (inAct) {
                parsedActs.push({
                    actNum: currentActNum,
                    title: currentActTitle,
                    content: currentActContent.join('\n').trim()
                });
            }
            
            // Fallback if absolutely no text was parsed
            if (parsedActs.length === 0) {
                parsedActs.push({
                    actNum: 'Act I',
                    title: 'The Chronicle',
                    content: storyText
                });
            }
            
            return parsedActs;
        }

        function displayAct(index, autoScroll = true) {
            if (index < 0 || index >= acts.length) return;
            
            const prevScroll = window.scrollY;
            
            currentActIndex = index;
            const act = acts[index];
            
            // Update the eyebrow (Act I / Act II / Act III) and subtitle
            document.getElementById('act-eyebrow').textContent = act.actNum;
            actTitle.textContent = act.title;
            storyContent.innerHTML = marked.parse(act.content);
            actIndicator.textContent = `${act.actNum} / ${acts.length}`;
            
            prevActBtn.disabled = (index === 0);
            nextActBtn.disabled = (index === acts.length - 1);
            
            // Smooth scroll to top of chapter only if requested
            if (autoScroll) {
                storyViewSection.scrollIntoView({ behavior: 'smooth' });
            } else {
                window.scrollTo(0, prevScroll);
            }
        }

        prevActBtn.addEventListener('click', () => displayAct(currentActIndex - 1));
        nextActBtn.addEventListener('click', () => displayAct(currentActIndex + 1));

        generateStoryBtn.addEventListener('click', async () => {
            if (currentDeck.length === 0) return;
            
            // Transition to cinematic view
            resultsSection.style.display = 'none';
            storyViewSection.style.display = 'block';
            loadingStory.style.display = 'flex';
            actContainer.style.display = 'none';
            
            // Populate mini team view
            detectedTeamMini.innerHTML = '';
            currentDeck.forEach(card => {
                const span = document.createElement('span');
                span.className = 'mini-card-badge';
                span.textContent = card.replace(/-/g, ' ').toUpperCase();
                detectedTeamMini.appendChild(span);
            });

            try {
                const response = await fetch('/generate_story', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ deck: currentDeck })
                });
                
                if (!response.ok) {
                    const errText = await response.text();
                    alert('Error: ' + errText);
                    resetAll();
                    return;
                }

                actContainer.style.display = 'block';
                loadingStory.style.display = 'none';

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let rawText = "";
                let isFirstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    rawText += chunk;
                    
                    acts = parseActs(rawText);
                    if (acts.length > 0) {
                        if (isFirstChunk) {
                            // On the very first chunk, initialize to Act 1 and scroll down
                            displayAct(0, true);
                            isFirstChunk = false;
                        } else {
                            // On subsequent chunks, just refresh the act the user is CURRENTLY looking at
                            // Do not force them to jump acts, and do not scroll lock them
                            displayAct(currentActIndex, false);
                        }
                    }
                }
            } catch (err) {
                alert('Failed to generate story: ' + err.message);
                resetAll();
            }
        });
    </script>
</body>
</html>
